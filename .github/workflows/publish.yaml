name: "Publish Plugin"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version (e.g. 1.0.0.0 or v1.0.0.0)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      artifact_name: ${{ steps.build.outputs.artifact_name }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set version from release
        id: version
        run: |
          RAW="${{ github.event.release.tag_name || github.event.inputs.version }}"
          TAG="$RAW"
          if [[ "$TAG" != v* ]]; then
            TAG="v$TAG"
          fi
          VERSION="${RAW#v}"
          # Ensure 4-part version (e.g. 1.0.0 -> 1.0.0.0)
          PARTS=$(echo "$VERSION" | tr '.' '\n' | wc -l)
          if [ "$PARTS" -eq 3 ]; then
            VERSION="${VERSION}.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Update plugin version in project files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/<Version>.*<\/Version>/<Version>$VERSION<\/Version>/" TheIntroDB/TheIntroDB.csproj
          sed -i "s/<AssemblyVersion>.*<\/AssemblyVersion>/<AssemblyVersion>$VERSION<\/AssemblyVersion>/" TheIntroDB/TheIntroDB.csproj
          sed -i "s/<FileVersion>.*<\/FileVersion>/<FileVersion>$VERSION<\/FileVersion>/" TheIntroDB/TheIntroDB.csproj

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x" # Emby plugins typically use an older .NET version

      - name: Build Emby Plugin
        id: build
        run: |
          dotnet build --configuration Release TheIntroDB/TheIntroDB.csproj
          ARTIFACT_NAME="theintrodb_${{ steps.version.outputs.version }}.dll"
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          cp TheIntroDB/bin/Release/netstandard2.0/TheIntroDB.dll "$ARTIFACT_NAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          retention-days: 30
          if-no-files-found: error
          path: ${{ steps.build.outputs.artifact_name }}

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Prepare GH Release Assets
        run: |
          for file in ./*.dll; do
            [ -f "$file" ] || continue
            md5sum "${file#./}" > "${file%.*}.md5"
          done
          ls -l

      - name: Upload GH Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          files: |
            *.dll
            *.md5
          fail_on_unmatched_files: true
